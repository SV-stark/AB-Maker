<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Glow/Shadow -->
  <circle cx="256" cy="256" r="220" fill="url(#bg-grad)" filter="url(#shadow)" />
  
  <!-- Headphone Band -->
  <path d="M120 280 A 136 136 0 0 1 392 280" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" />
  
  <!-- Book Base -->
  <rect x="166" y="180" width="180" height="220" rx="12" fill="white" />
  <rect x="166" y="180" width="30" height="220" rx="4" fill="#e2e8f0" /> <!-- Spine -->
  
  <!-- Book Lines -->
  <rect x="210" y="230" width="100" height="8" rx="4" fill="#3b82f6" />
  <rect x="210" y="260" width="100" height="8" rx="4" fill="#3b82f6" />
  <rect x="210" y="290" width="70" height="8" rx="4" fill="#3b82f6" />
  
  <!-- Earcups -->
  <rect x="90" y="260" width="45" height="100" rx="20" fill="white" />
  <rect x="377" y="260" width="45" height="100" rx="20" fill="white" />
  
  <!-- Small Accents -->
  <circle cx="112" cy="310" r="8" fill="#3b82f6" opacity="0.5" />
  <circle cx="400" cy="310" r="8" fill="#3b82f6" opacity="0.5" />
</svg>
